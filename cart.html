<!DOCTYPE html>
<html>
<head>
<title>Cart</title>
<!-- <link rel="stylesheet" href="cart.css"> -->
</head>
<body>
    <style>
        body{
    background:#F3F4F6;
    font-family:Arial,sans-serif;
}

h1{
    text-align:center;
    margin:20px;
}

#cart-container{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
    justify-content:center;
}

.card{
    width:250px;
    background:white;
    border-radius:10px;
    padding:15px;
    text-align:center;
    box-shadow:0 4px 8px rgba(0,0,0,0.1);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:10px;
}

.card h3{
    margin-top:10px;
}

.price{
    color:#E63946;
    font-size:20px;
    font-weight:bold;
    margin:10px 0;
}

.total{
    width:100%;
    text-align:center;
    margin-top:20px;
    color:green;
}
.remove-btn{
    width:120px;
    height:40px;
    background:#DC2626;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
    </style>

<h1>🛒 My Cart</h1>

<div id="cart-container"></div>

<script>
const cart =
JSON.parse(localStorage.getItem("cart")) || [];

const container =
document.getElementById("cart-container");

let total = 0;

cart.forEach(product => {

    total += Number(product.price);

    container.innerHTML += `
    <div class="card">
        <img src="${product.image}">
        <h3>${product.name}</h3>
        <p class="price">₹${product.price}</p>
        <button class="remove-btn">
        Remove
    </button>
    </div>
    `;
});

container.innerHTML += `
<h2 class="total">
Total : ₹${total}
</h2>
`;
</script>

</body>
</html>
