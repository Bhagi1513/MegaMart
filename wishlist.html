<!DOCTYPE html>
<html>
<head>
<title>Wishlist</title>
<!-- <link rel="stylesheet" href="wishlist.css"> -->
</head>
<body>
    <style>
        body{
    background:#F3F4F6;
    font-family:Arial,sans-serif;
}

h1{
    text-align:center;
    margin:20px;
}

#wishlist-container{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
    justify-content:center;
}

.card{
    width:250px;
    background:white;
    border-radius:10px;
    padding:15px;
    text-align:center;
    box-shadow:0 4px 8px rgba(0,0,0,0.1);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:10px;
}

.card h3{
    margin-top:10px;
}

.price{
    color:#E63946;
    font-size:20px;
    font-weight:bold;
    margin:10px 0;
}

.total{
    width:100%;
    text-align:center;
    margin-top:20px;
    color:green;
}
    </style>

<h1>❤️ My Wishlist</h1>

<div id="wishlist-container"></div>

<script>
const wishlist =
JSON.parse(localStorage.getItem("wishlist")) || [];

const container =
document.getElementById("wishlist-container");

wishlist.forEach(product => {

    container.innerHTML += `
    <div class="card">
        <img src="${product.image}">
        <h3>${product.name}</h3>
        <p class="price">₹${product.price}</p>
    </div>
    `;
});
</script>

</body>
</html>
